<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/jobs">
      <span class="brand-icon">🚀</span> Smart Job Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/jobs">Browse Jobs</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" href="/student/dashboard">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
          <a class="nav-link" href="/employer/dashboard">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="/admin/dashboard">Admin Panel</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" href="/login">Login</a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="btn btn-primary-grad ms-2" href="/register">Get Started</a>
        </li>
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <a class="nav-link dropdown-toggle user-avatar-nav" href="#" data-bs-toggle="dropdown">
            <span class="avatar-circle" sec:authentication="name">U</span>
            <span sec:authentication="name" class="ms-2 d-none d-md-inline"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-lg">
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" href="/student/profile"><i class="bi bi-person me-2"></i>Profile</a>
            </li>
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" href="/student/applications"><i class="bi bi-briefcase me-2"></i>My Applications</a>
            </li>
            <li sec:authorize="hasRole('EMPLOYER')">
              <a class="dropdown-item" href="/employer/profile"><i class="bi bi-person me-2"></i>Profile</a>
            </li>
            <li sec:authorize="hasRole('EMPLOYER')">
              <a class="dropdown-item" href="/employer/jobs"><i class="bi bi-list-ul me-2"></i>My Jobs</a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
</body>
</html>
