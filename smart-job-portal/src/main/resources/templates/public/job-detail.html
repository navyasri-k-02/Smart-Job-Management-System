<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${job.title} + ' – Smart Job Portal'"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="container py-5">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-4">
              <div>
                <h2 class="fw-bold mb-1" th:text="${job.title}"></h2>
                <p class="text-muted fs-5 mb-0"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}"></span></p>
              </div>
              <span class="job-type-badge fs-6" th:text="${job.jobType ?: 'Full-time'}"></span>
            </div>

            <div class="row g-3 mb-4 p-3 bg-light rounded-3">
              <div class="col-6 col-md-3 text-center" th:if="${job.location}">
                <div class="text-primary"><i class="bi bi-geo-alt-fill fs-4"></i></div>
                <div class="small text-muted">Location</div>
                <div class="fw-semibold small" th:text="${job.location}"></div>
              </div>
              <div class="col-6 col-md-3 text-center" th:if="${job.salary}">
                <div class="text-success"><i class="bi bi-cash-stack fs-4"></i></div>
                <div class="small text-muted">Salary</div>
                <div class="fw-semibold small" th:text="${job.salary}"></div>
              </div>
              <div class="col-6 col-md-3 text-center" th:if="${job.experience}">
                <div class="text-warning"><i class="bi bi-briefcase-fill fs-4"></i></div>
                <div class="small text-muted">Experience</div>
                <div class="fw-semibold small" th:text="${job.experience}"></div>
              </div>
              <div class="col-6 col-md-3 text-center" th:if="${job.industry}">
                <div class="text-info"><i class="bi bi-building fs-4"></i></div>
                <div class="small text-muted">Industry</div>
                <div class="fw-semibold small" th:text="${job.industry}"></div>
              </div>
            </div>

            <h5 class="fw-bold mb-3">Job Description</h5>
            <div th:utext="${job.description}" class="job-description-full"></div>

            <div th:if="${job.skills}" class="mt-4">
              <h5 class="fw-bold mb-3">Required Skills</h5>
              <span th:each="skill : ${#strings.arraySplit(job.skills, ',')}"
                    class="skill-tag fs-6" th:text="${skill.trim()}"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <!-- Apply Prompt -->
        <div class="card border-0 shadow-sm rounded-3 mb-3" style="background:linear-gradient(135deg,#667eea,#764ba2);">
          <div class="card-body p-4 text-white text-center">
            <div style="font-size:48px;margin-bottom:12px;">🚀</div>
            <h5 class="fw-bold mb-2">Ready to Apply?</h5>
            <p class="mb-3 opacity-75 small">Login or create an account to apply for this position.</p>
            <a href="/login" class="btn btn-white w-100 mb-2 fw-bold text-primary">Login to Apply</a>
            <a href="/register" class="btn btn-outline-light w-100">Create Account</a>
          </div>
        </div>

        <!-- Job Summary -->
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-body p-4">
            <h6 class="fw-bold mb-3">Job Summary</h6>
            <div class="d-flex justify-content-between mb-2 border-bottom pb-2">
              <span class="text-muted small">Posted</span>
              <span class="small fw-semibold" th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></span>
            </div>
            <div class="d-flex justify-content-between mb-2 border-bottom pb-2" th:if="${job.deadline}">
              <span class="text-muted small">Deadline</span>
              <span class="small fw-semibold" th:text="${#temporals.format(job.deadline, 'MMM dd, yyyy')}"></span>
            </div>
            <div class="d-flex justify-content-between mb-2 border-bottom pb-2" th:if="${job.jobType}">
              <span class="text-muted small">Job Type</span>
              <span class="small fw-semibold" th:text="${job.jobType}"></span>
            </div>
            <div class="d-flex justify-content-between" th:if="${job.education}">
              <span class="text-muted small">Education</span>
              <span class="small fw-semibold" th:text="${job.education}"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a href="/jobs" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back to Jobs
      </a>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
