<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Hero Section -->
<div class="hero-section">
  <div class="container text-center py-5">
    <h1 class="fw-bold text-white mb-3" style="font-size:3rem;">Find Your Dream Job Today</h1>
    <p class="text-white-50 fs-5 mb-5">Thousands of opportunities waiting for you</p>

    <form th:action="@{/jobs}" method="get" class="search-form-hero">
      <div class="row g-2 justify-content-center">
        <div class="col-md-4">
          <div class="input-group">
            <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0" name="keyword" th:value="${keyword}"
                   placeholder="Job title, skills, keywords...">
          </div>
        </div>
        <div class="col-md-3">
          <div class="input-group">
            <span class="input-group-text bg-white border-0"><i class="bi bi-geo-alt text-muted"></i></span>
            <input type="text" class="form-control border-0" name="location" th:value="${location}" placeholder="Location...">
          </div>
        </div>
        <div class="col-md-2">
          <select class="form-select border-0" name="jobType">
            <option value="">All Types</option>
            <option value="Full-time" th:selected="${jobType == 'Full-time'}">Full-time</option>
            <option value="Part-time" th:selected="${jobType == 'Part-time'}">Part-time</option>
            <option value="Internship" th:selected="${jobType == 'Internship'}">Internship</option>
            <option value="Remote" th:selected="${jobType == 'Remote'}">Remote</option>
          </select>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">
            <i class="bi bi-search me-1"></i>Search
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
      <span th:text="${jobs.size()}"></span> Jobs Available
    </h4>
    <a th:if="${(keyword != null and !#strings.isEmpty(keyword)) or (location != null and !#strings.isEmpty(location)) or (jobType != null and !#strings.isEmpty(jobType))}" href="/jobs" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-x me-1"></i>Clear Filters
    </a>
  </div>

  <div th:if="${jobs.isEmpty()}" class="text-center py-5">
    <div style="font-size:64px;opacity:.2">🔍</div>
    <h5 class="text-muted mt-3">No jobs found</h5>
    <p class="text-muted">Try different search terms.</p>
  </div>

  <div class="row g-4">
    <div class="col-md-6 col-xl-4" th:each="job : ${jobs}">
      <div class="job-card">
        <div class="job-card-header">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="job-title" th:text="${job.title}"></h5>
              <p class="job-company"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}"></span></p>
            </div>
            <span class="job-type-badge" th:text="${job.jobType ?: 'N/A'}"></span>
          </div>
        </div>
        <div class="job-card-body">
          <div class="job-meta">
            <span th:if="${job.location}"><i class="bi bi-geo-alt me-1"></i><span th:text="${job.location}"></span></span>
            <span th:if="${job.salary}"><i class="bi bi-cash me-1"></i><span th:text="${job.salary}"></span></span>
          </div>
          <p class="job-description" th:text="${#strings.abbreviate(job.description, 110)}"></p>
          <div class="job-skills" th:if="${job.skills}">
            <span th:each="skill : ${#strings.arraySplit(job.skills, ',')}"
                  class="skill-tag" th:text="${skill.trim()}"></span>
          </div>
        </div>
        <div class="job-card-footer">
          <span class="text-muted small">
            <i class="bi bi-clock me-1"></i>
            <span th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></span>
          </span>
          <a th:href="'/jobs/' + ${job.id}" class="btn btn-sm btn-outline-primary">Details</a>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA for non-logged-in users -->
  <div class="cta-section mt-5 text-center p-5 rounded-4">
    <h3 class="fw-bold text-white mb-3">Ready to Start Your Career Journey?</h3>
    <p class="text-white-50 mb-4">Create an account to apply, track applications, and get email notifications.</p>
    <a href="/register" class="btn btn-warning btn-lg fw-bold px-5 me-3">Create Account</a>
    <a href="/login" class="btn btn-outline-light btn-lg px-5">Login</a>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
