<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Jobs – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h2 class="fw-bold mb-1">My Job Postings</h2>
        <p class="text-muted mb-0">Manage all your posted jobs</p>
      </div>
      <a href="/employer/jobs/post" class="btn btn-primary-grad">
        <i class="bi bi-plus-circle me-2"></i>Post New Job
      </a>
    </div>
  </div>

  <div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${jobs.isEmpty()}" class="text-center py-5">
      <div style="font-size:64px;opacity:.25">📋</div>
      <h5 class="text-muted mt-3">No jobs posted yet</h5>
      <a href="/employer/jobs/post" class="btn btn-primary-grad mt-2">Post Your First Job</a>
    </div>

    <div class="row g-4" th:unless="${jobs.isEmpty()}">
      <div class="col-md-6 col-xl-4" th:each="job : ${jobs}">
        <div class="card border-0 shadow-sm rounded-3 h-100 hover-lift">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <span th:class="'badge ' + (${job.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary')"
                    th:text="${job.status.name()}"></span>
              <span class="text-muted small" th:text="${#temporals.format(job.createdAt, 'MMM dd')}"></span>
            </div>
            <h5 class="fw-bold mb-1" th:text="${job.title}"></h5>
            <p class="text-muted small mb-2">
              <i class="bi bi-geo-alt me-1"></i><span th:text="${job.location ?: 'Remote'}"></span>
              <span class="mx-2">·</span>
              <span th:text="${job.jobType ?: 'Full-time'}"></span>
            </p>
            <p class="text-muted small" th:text="${#strings.abbreviate(job.description, 90)}"></p>

            <div class="d-flex align-items-center gap-2 mt-3 pt-3 border-top flex-wrap">
              <a th:href="'/employer/jobs/' + ${job.id} + '/applicants'"
                 class="btn btn-sm btn-outline-primary">
                <i class="bi bi-people me-1"></i>Applicants
              </a>
              <a th:href="'/employer/jobs/' + ${job.id} + '/edit'"
                 class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-pencil me-1"></i>Edit
              </a>
              <form th:action="'/employer/jobs/' + ${job.id} + '/toggle-status'" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-warning">
                  <i th:class="'bi ' + (${job.status.name() == 'ACTIVE'} ? 'bi-pause-circle' : 'bi-play-circle')"></i>
                </button>
              </form>
              <form th:action="'/employer/jobs/' + ${job.id} + '/delete'" method="post" class="d-inline"
                    onsubmit="return confirm('Delete this job?')">
                <button type="submit" class="btn btn-sm btn-outline-danger">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
