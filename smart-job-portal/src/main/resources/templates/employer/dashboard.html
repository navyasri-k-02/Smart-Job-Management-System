<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h2 class="mb-1 fw-bold">
          Welcome, <span th:text="${user.companyName ?: user.fullName}" class="text-gradient"></span>! 🏢
        </h2>
        <p class="text-muted mb-0">Manage your job postings and review candidates</p>
      </div>
      <a href="/employer/jobs/post" class="btn btn-primary-grad">
        <i class="bi bi-plus-circle me-2"></i>Post New Job
      </a>
    </div>
  </div>

  <div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4 mb-5">
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-blue">
          <div class="stat-card-icon"><i class="bi bi-briefcase-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalJobs}">0</div>
            <div class="stat-card-label">Total Jobs Posted</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-green">
          <div class="stat-card-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${activeJobs}">0</div>
            <div class="stat-card-label">Active Jobs</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-purple">
          <div class="stat-card-icon"><i class="bi bi-people-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalApplications}">0</div>
            <div class="stat-card-label">Total Applicants</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Applications -->
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold"><i class="bi bi-people me-2 text-primary"></i>Recent Applicants</h5>
        <a href="/employer/jobs" class="btn btn-sm btn-outline-primary">Manage Jobs</a>
      </div>
      <div class="card-body p-0">
        <div th:if="${recentApplications.isEmpty()}" class="text-center py-5">
          <div style="font-size:48px;opacity:.3">👥</div>
          <p class="text-muted mt-2">No applicants yet. Post jobs to start receiving applications!</p>
        </div>
        <div class="table-responsive" th:unless="${recentApplications.isEmpty()}">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Candidate</th>
                <th>Applied For</th>
                <th>Applied Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="app : ${recentApplications}">
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="company-avatar company-avatar-sm">
                      <span th:text="${#strings.substring(app.student.fullName, 0, 1).toUpperCase()}">S</span>
                    </div>
                    <div>
                      <div class="fw-semibold" th:text="${app.student.fullName}"></div>
                      <div class="text-muted small" th:text="${app.student.email}"></div>
                    </div>
                  </div>
                </td>
                <td th:text="${app.job.title}"></td>
                <td class="text-muted small" th:text="${#temporals.format(app.appliedAt, 'MMM dd, yyyy')}"></td>
                <td>
                  <span th:class="'badge status-badge ' + ${app.status.name().toLowerCase()}"
                        th:text="${app.status.name()}"></span>
                </td>
                <td>
                  <a th:href="'/employer/jobs/' + ${app.job.id} + '/applicants'" class="btn btn-sm btn-outline-primary">
                    Review
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
