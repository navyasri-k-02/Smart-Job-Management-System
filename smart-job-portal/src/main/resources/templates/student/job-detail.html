<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${job.title + ' – Smart Job Portal'}"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="container py-5">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
      <!-- Main Content -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-4">
              <div>
                <h2 class="fw-bold mb-1" th:text="${job.title}"></h2>
                <p class="text-muted fs-5 mb-0">
                  <i class="bi bi-building me-1"></i><span th:text="${job.companyName}"></span>
                </p>
              </div>
              <span class="job-type-badge fs-6" th:text="${job.jobType ?: 'Full-time'}"></span>
            </div>

            <!-- Job Meta -->
            <div class="row g-3 mb-4 p-3 bg-light rounded-3">
              <div class="col-sm-6 col-md-3 text-center" th:if="${job.location}">
                <div class="fw-semibold text-primary"><i class="bi bi-geo-alt-fill"></i></div>
                <div class="small text-muted">Location</div>
                <div class="fw-semibold small" th:text="${job.location}"></div>
              </div>
              <div class="col-sm-6 col-md-3 text-center" th:if="${job.salary}">
                <div class="fw-semibold text-success"><i class="bi bi-cash-stack"></i></div>
                <div class="small text-muted">Salary</div>
                <div class="fw-semibold small" th:text="${job.salary}"></div>
              </div>
              <div class="col-sm-6 col-md-3 text-center" th:if="${job.experience}">
                <div class="fw-semibold text-warning"><i class="bi bi-briefcase-fill"></i></div>
                <div class="small text-muted">Experience</div>
                <div class="fw-semibold small" th:text="${job.experience}"></div>
              </div>
              <div class="col-sm-6 col-md-3 text-center" th:if="${job.deadline}">
                <div class="fw-semibold text-danger"><i class="bi bi-calendar-event-fill"></i></div>
                <div class="small text-muted">Deadline</div>
                <div class="fw-semibold small" th:text="${#temporals.format(job.deadline, 'MMM dd, yyyy')}"></div>
              </div>
            </div>

            <h5 class="fw-bold mb-3">Job Description</h5>
            <div class="job-description-full" th:utext="${job.description}"></div>

            <div th:if="${job.skills}" class="mt-4">
              <h5 class="fw-bold mb-3">Required Skills</h5>
              <div>
                <span th:each="skill : ${#strings.arraySplit(job.skills, ',')}"
                      class="skill-tag fs-6 mb-2" th:text="${skill.trim()}"></span>
              </div>
            </div>

            <div th:if="${job.education}" class="mt-4">
              <h5 class="fw-bold mb-3">Education</h5>
              <p th:text="${job.education}"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="col-lg-4">
        <!-- Apply Card -->
        <div class="card border-0 shadow-sm rounded-3 mb-3">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-3">Apply for this Position</h5>
            <div th:if="${alreadyApplied}" class="alert alert-info mb-3">
              <i class="bi bi-check-circle-fill me-2"></i>You've already applied for this job.
            </div>
            <div th:unless="${alreadyApplied}">
              <div th:unless="${hasResume}" class="alert alert-warning mb-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                Please <a href="/student/profile" class="alert-link">upload your resume</a> first.
              </div>
              <form th:action="'/student/jobs/' + ${job.id} + '/apply'" method="post" th:if="${hasResume}">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Cover Letter (Optional)</label>
                  <textarea class="form-control" name="coverLetter" rows="5"
                            placeholder="Tell the employer why you're a great fit..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary-grad w-100 py-2">
                  <i class="bi bi-send-fill me-2"></i>Submit Application
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Company Info -->
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-3">About the Company</h5>
            <p class="fw-semibold mb-1" th:text="${job.companyName}"></p>
            <p class="text-muted small mb-2" th:if="${job.industry}" th:text="${job.industry}"></p>
            <div th:if="${job.employer.companyDescription}" class="text-muted small"
                 th:text="${job.employer.companyDescription}"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <a href="/student/jobs" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back to Jobs
      </a>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
