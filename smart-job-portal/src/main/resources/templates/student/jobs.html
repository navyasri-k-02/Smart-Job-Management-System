<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <!-- Search Bar -->
  <div class="search-hero">
    <div class="container">
      <h2 class="text-white fw-bold mb-4 text-center">Find Your Dream Job</h2>
      <form th:action="@{/student/jobs}" method="get" class="search-form">
        <div class="row g-2">
          <div class="col-md-4">
            <div class="input-group">
              <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
              <input type="text" class="form-control border-0" name="keyword" th:value="${keyword}" placeholder="Job title, skills, keywords...">
            </div>
          </div>
          <div class="col-md-3">
            <div class="input-group">
              <span class="input-group-text bg-white border-0"><i class="bi bi-geo-alt text-muted"></i></span>
              <input type="text" class="form-control border-0" name="location" th:value="${location}" placeholder="Location...">
            </div>
          </div>
          <div class="col-md-2">
            <select class="form-select border-0" name="jobType">
              <option value="">All Types</option>
              <option value="Full-time" th:selected="${jobType == 'Full-time'}">Full-time</option>
              <option value="Part-time" th:selected="${jobType == 'Part-time'}">Part-time</option>
              <option value="Internship" th:selected="${jobType == 'Internship'}">Internship</option>
              <option value="Remote" th:selected="${jobType == 'Remote'}">Remote</option>
              <option value="Contract" th:selected="${jobType == 'Contract'}">Contract</option>
            </select>
          </div>
          <div class="col-md-2">
            <select class="form-select border-0" name="industry">
              <option value="">All Industries</option>
              <option value="Technology">Technology</option>
              <option value="Finance">Finance</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Education">Education</option>
              <option value="Marketing">Marketing</option>
              <option value="Engineering">Engineering</option>
              <option value="Design">Design</option>
              <option value="Sales">Sales</option>
            </select>
          </div>
          <div class="col-md-1">
            <button type="submit" class="btn btn-warning w-100 fw-bold">Search</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <p class="text-muted mb-0">
        Found <strong th:text="${jobs.size()}">0</strong> jobs
        <span th:if="${keyword}"> for "<strong th:text="${keyword}"></strong>"</span>
      </p>
     <a th:if="${(keyword != null and !#strings.isEmpty(keyword)) or (location != null and !#strings.isEmpty(location)) or (jobType != null and !#strings.isEmpty(jobType)) or (industry != null and !#strings.isEmpty(industry))}" href="/student/jobs" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-x me-1"></i>Clear Filters
		<div class="d-flex justify-content-between align-items-center mb-4">
		    <p class="text-muted mb-0">
		        Found <strong ...>0</strong> jobs
		        ...
		    </p>
		    ← REPLACE THIS LINE HERE →
		    <a th:if="${keyword or location or jobType or industry}" ...>
		        <i class="bi bi-x me-1"></i>Clear Filters
		    </a>
		</div>
      </a>
    </div>

    <!-- No results -->
    <div th:if="${jobs.isEmpty()}" class="text-center py-5">
      <div style="font-size:64px;opacity:.25">🔍</div>
      <h5 class="text-muted mt-3">No jobs found</h5>
      <p class="text-muted">Try different search keywords or filters.</p>
    </div>

    <!-- Job Cards -->
    <div class="row g-4">
      <div class="col-md-6 col-xl-4" th:each="job : ${jobs}">
        <div class="job-card">
          <div class="job-card-header">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h5 class="job-title" th:text="${job.title}"></h5>
                <p class="job-company"><i class="bi bi-building me-1"></i><span th:text="${job.companyName}"></span></p>
              </div>
              <span class="job-type-badge" th:text="${job.jobType ?: 'N/A'}"></span>
            </div>
          </div>
          <div class="job-card-body">
            <div class="job-meta">
              <span th:if="${job.location}"><i class="bi bi-geo-alt me-1"></i><span th:text="${job.location}"></span></span>
              <span th:if="${job.salary}"><i class="bi bi-currency-dollar me-1"></i><span th:text="${job.salary}"></span></span>
              <span th:if="${job.experience}"><i class="bi bi-briefcase me-1"></i><span th:text="${job.experience}"></span></span>
            </div>
            <p class="job-description" th:text="${#strings.abbreviate(job.description, 120)}"></p>
            <div class="job-skills" th:if="${job.skills}">
              <span th:each="skill : ${#strings.arraySplit(job.skills, ',')}"
                    class="skill-tag" th:text="${skill.trim()}"></span>
            </div>
          </div>
          <div class="job-card-footer">
            <span class="text-muted small">
              <i class="bi bi-clock me-1"></i>
              <span th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></span>
            </span>
            <a th:href="'/student/jobs/' + ${job.id}" class="btn btn-sm btn-primary-grad">View & Apply</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
