<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <h2 class="fw-bold mb-1">My Profile</h2>
      <p class="text-muted mb-0">Manage your personal information and resume</p>
    </div>
  </div>

  <div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
      <!-- Profile Sidebar -->
      <div class="col-lg-3">
        <div class="card border-0 shadow-sm rounded-3 text-center p-4 mb-3">
          <div class="profile-avatar mx-auto mb-3">
            <span th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">U</span>
          </div>
          <h5 class="fw-bold mb-1" th:text="${user.fullName}"></h5>
          <p class="text-muted small mb-2" th:text="${user.email}"></p>
          <span class="badge bg-primary">Student</span>
        </div>

        <!-- Resume Card -->
        <div class="card border-0 shadow-sm rounded-3 p-4">
          <h6 class="fw-bold mb-3"><i class="bi bi-file-earmark-pdf-fill text-danger me-2"></i>Resume</h6>
          <div th:if="${user.resumePath != null and !user.resumePath.isEmpty()}" class="mb-3">
            <div class="d-flex align-items-center gap-2 p-2 bg-light rounded-2">
              <i class="bi bi-file-earmark-pdf text-danger fs-5"></i>
              <span class="small fw-semibold">Resume uploaded ✓</span>
            </div>
          </div>
          <div th:unless="${user.resumePath != null and !user.resumePath.isEmpty()}" class="mb-3">
            <div class="d-flex align-items-center gap-2 p-2 bg-warning bg-opacity-10 rounded-2 border border-warning">
              <i class="bi bi-exclamation-triangle text-warning fs-5"></i>
              <span class="small">No resume uploaded</span>
            </div>
          </div>
          <form th:action="@{/student/resume/upload}" method="post" enctype="multipart/form-data">
            <div class="mb-2">
              <label class="form-label small text-muted">PDF only, max 2MB</label>
              <input type="file" class="form-control form-control-sm" name="resume" accept=".pdf" required>
            </div>
            <button type="submit" class="btn btn-sm btn-danger w-100">
              <i class="bi bi-upload me-1"></i>Upload Resume
            </button>
          </form>
        </div>
      </div>

      <!-- Profile Form -->
      <div class="col-lg-9">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-header bg-white border-0 py-3">
            <ul class="nav nav-tabs card-header-tabs" id="profileTabs">
              <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#personal">Personal Info</a></li>
              <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#professional">Professional</a></li>
            </ul>
          </div>
          <div class="card-body p-4">
            <form th:action="@{/student/profile}" method="post" th:object="${user}">
              <div class="tab-content">
                <!-- Personal Tab -->
                <div class="tab-pane fade show active" id="personal">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Full Name</label>
                      <input type="text" class="form-control" th:field="*{fullName}" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Email</label>
                      <input type="email" class="form-control bg-light" th:value="${user.email}" readonly>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Phone</label>
                      <input type="tel" class="form-control" th:field="*{phone}" placeholder="+1 (555) 000-0000">
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Location</label>
                      <input type="text" class="form-control" th:field="*{location}" placeholder="City, Country">
                    </div>
                    <div class="col-12">
                      <label class="form-label fw-semibold">Bio</label>
                      <textarea class="form-control" th:field="*{bio}" rows="3"
                                placeholder="Write a short bio about yourself..."></textarea>
                    </div>
                  </div>
                </div>

                <!-- Professional Tab -->
                <div class="tab-pane fade" id="professional">
                  <div class="row g-3">
                    <div class="col-12">
                      <label class="form-label fw-semibold">Skills</label>
                      <input type="text" class="form-control" th:field="*{skills}"
                             placeholder="e.g., Java, Spring Boot, MySQL, React (comma separated)">
                      <div class="form-text">Separate skills with commas</div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Experience</label>
                      <select class="form-select" th:field="*{experience}">
                        <option value="">Select experience level</option>
                        <option value="Fresher">Fresher (0 years)</option>
                        <option value="0-1 years">0-1 years</option>
                        <option value="1-3 years">1-3 years</option>
                        <option value="3-5 years">3-5 years</option>
                        <option value="5+ years">5+ years</option>
                      </select>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-semibold">Education</label>
                      <input type="text" class="form-control" th:field="*{education}"
                             placeholder="e.g., B.Tech Computer Science">
                    </div>
                  </div>
                </div>
              </div>

              <div class="mt-4 pt-3 border-top">
                <button type="submit" class="btn btn-primary-grad px-4 py-2">
                  <i class="bi bi-save me-2"></i>Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
