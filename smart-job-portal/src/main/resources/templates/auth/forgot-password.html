<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0 p-4" style="max-width:440px;width:100%;border-radius:20px;">
    <div class="text-center mb-4">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;">🔑</div>
      <h4 class="fw-bold mb-1">Forgot Password?</h4>
      <p class="text-muted small">Enter your email and we'll send you a reset OTP.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
      <div class="mb-4">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" name="email" placeholder="your@email.com" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-grad w-100 py-2 mb-3">
        <i class="bi bi-send me-2"></i>Send Reset OTP
      </button>
    </form>
    <div class="text-center">
      <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
