<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0 p-4" style="max-width:460px;width:100%;border-radius:20px;">
    <div class="text-center mb-4">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;">✉️</div>
      <h4 class="fw-bold mb-1">Verify Your Email</h4>
      <p class="text-muted small">We've sent a 6-digit OTP to your email. Enter it below to verify your account.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
    </div>

    <form th:action="@{/verify-otp}" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control" name="email" th:value="${email}"
               placeholder="your@email.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Enter OTP</label>
        <div class="otp-input-group">
          <input type="text" class="form-control otp-input text-center fw-bold fs-4 letter-spacing-wide"
                 name="otp" maxlength="6" placeholder="000000" required
                 style="letter-spacing:10px;">
        </div>
      </div>
      <button type="submit" class="btn btn-primary-grad w-100 py-2 mb-3">
        <i class="bi bi-shield-check me-2"></i>Verify Email
      </button>
    </form>

    <div class="text-center">
      <p class="text-muted small mb-2">Didn't receive the code?</p>
      <form th:action="@{/resend-otp}" method="post" class="d-inline">
        <input type="hidden" name="email" th:value="${email}" id="resendEmail">
        <input type="hidden" name="purpose" value="EMAIL_VERIFICATION">
        <button type="submit" class="btn btn-link text-primary p-0 fw-semibold"
                id="resendBtn">Resend OTP</button>
      </form>
      <span class="text-muted small ms-1" id="countdown"></span>
    </div>

    <div class="text-center mt-3">
      <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Countdown timer for resend
  let seconds = 60;
  const btn = document.getElementById('resendBtn');
  const countdown = document.getElementById('countdown');
  btn.disabled = true;
  const timer = setInterval(() => {
    countdown.textContent = `(${seconds}s)`;
    seconds--;
    if (seconds < 0) {
      clearInterval(timer);
      btn.disabled = false;
      countdown.textContent = '';
    }
  }, 1000);

  // Auto-focus OTP input
  document.querySelector('.otp-input').focus();
</script>
</body>
</html>
