<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-wrapper">
  <div class="auth-card">
    <!-- Left Panel -->
    <div class="auth-left d-none d-lg-flex">
      <div class="auth-left-content">
        <div class="auth-logo mb-4">🚀</div>
        <h2 class="text-white fw-bold mb-3">Smart Job Portal</h2>
        <p class="text-white-50 mb-4">Your gateway to thousands of career opportunities. Connect with top employers and land your dream job.</p>
        <div class="auth-stats">
          <div class="stat-item"><span class="stat-number">10K+</span><span class="stat-label">Jobs Posted</span></div>
          <div class="stat-item"><span class="stat-number">5K+</span><span class="stat-label">Companies</span></div>
          <div class="stat-item"><span class="stat-number">50K+</span><span class="stat-label">Hired</span></div>
        </div>
      </div>
    </div>
    <!-- Right Panel -->
    <div class="auth-right">
      <div class="p-4 p-lg-5">
        <div class="text-center mb-4 d-lg-none">
          <span style="font-size:40px">🚀</span>
          <h4 class="fw-bold mt-2">Smart Job Portal</h4>
        </div>
        <h3 class="fw-bold mb-1">Welcome back!</h3>
        <p class="text-muted mb-4">Sign in to your account</p>

        <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success d-flex align-items-center gap-2">
          <i class="bi bi-check-circle-fill"></i>
          <span th:text="${message}"></span>
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" name="username" placeholder="you@example.com" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-semibold">Password</label>
              <a href="/forgot-password" class="text-primary text-decoration-none small">Forgot password?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" required>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">
                <i class="bi bi-eye" id="eye-password"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary-grad w-100 py-2 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>

        <div class="text-center">
          <span class="text-muted">Don't have an account? </span>
          <a href="/register" class="text-primary fw-semibold text-decoration-none">Create one</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById('eye-' + id);
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>
