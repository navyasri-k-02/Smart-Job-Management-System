<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg border-0 p-4" style="max-width:460px;width:100%;border-radius:20px;">
    <div class="text-center mb-4">
      <div style="width:80px;height:80px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;">🔒</div>
      <h4 class="fw-bold mb-1">Reset Password</h4>
      <p class="text-muted small">Enter the OTP sent to your email and set a new password.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span></div>
    <div th:if="${message}" class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span></div>

    <form th:action="@{/reset-password}" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control" name="email" th:value="${email}" placeholder="your@email.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">OTP Code</label>
        <input type="text" class="form-control text-center fw-bold fs-5" name="otp"
               maxlength="6" placeholder="000000" required style="letter-spacing:8px;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">New Password</label>
        <div class="input-group">
          <input type="password" class="form-control" name="newPassword" id="np" placeholder="Min. 6 characters" required minlength="6">
          <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('np')"><i class="bi bi-eye" id="eye-np"></i></button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <input type="password" class="form-control" name="confirmPassword" id="cp" placeholder="Repeat password" required>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('cp')"><i class="bi bi-eye" id="eye-cp"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-grad w-100 py-2 mb-3">
        <i class="bi bi-check-circle me-2"></i>Reset Password
      </button>
    </form>
    <div class="text-center">
      <a href="/login" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd(id) {
    const i = document.getElementById(id);
    document.getElementById('eye-'+id).className = (i.type = i.type === 'password' ? 'text' : 'password') === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
  }
</script>
</body>
</html>
