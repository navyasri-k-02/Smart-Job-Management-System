<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <h2 class="fw-bold mb-1">Manage Users</h2>
      <p class="text-muted mb-0" th:text="${users.size()} + ' total users registered'"></p>
    </div>
  </div>

  <div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search -->
    <div class="card border-0 shadow-sm rounded-3 mb-4">
      <div class="card-body p-3">
        <input type="text" class="form-control" id="userSearch"
               placeholder="🔍 Search users by name, email, or role...">
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="usersTable">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Role</th>
              <th>Status</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="user, iter : ${users}">
              <td class="text-muted small" th:text="${iter.count}"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <!-- FIX: single ${} expression, no nesting -->
                  <div class="company-avatar company-avatar-sm"
                       th:style="${user.role.name() == 'ADMIN'} ? 'background:#e74c3c' : (${user.role.name() == 'EMPLOYER'} ? 'background:#3498db' : 'background:#2ecc71')">
                    <span th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">U</span>
                  </div>
                  <div>
                    <div class="fw-semibold" th:text="${user.fullName}"></div>
                    <div class="text-muted small" th:text="${user.email}"></div>
                  </div>
                </div>
              </td>
              <td>
                <span th:class="${user.role.name() == 'ADMIN'} ? 'badge bg-danger' : (${user.role.name() == 'EMPLOYER'} ? 'badge bg-info' : 'badge bg-primary')"
                      th:text="${user.role.name()}"></span>
              </td>
              <td>
                <span th:class="${user.enabled} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                      th:text="${user.enabled} ? 'Active' : 'Inactive'"></span>
              </td>
              <td class="text-muted small"
                  th:text="${user.createdAt != null} ? ${#temporals.format(user.createdAt, 'MMM dd, yyyy')} : 'N/A'">
              </td>
              <td>
                <div class="d-flex gap-2">
                  <form th:action="'/admin/users/' + ${user.id} + '/toggle'" method="post">
                    <button type="submit"
                            th:class="${user.enabled} ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'"
                            th:title="${user.enabled} ? 'Deactivate' : 'Activate'">
                      <i th:class="${user.enabled} ? 'bi bi-pause-circle' : 'bi bi-play-circle'"></i>
                    </button>
                  </form>
                  <form th:unless="${user.role.name() == 'ADMIN'}"
                        th:action="'/admin/users/' + ${user.id} + '/delete'" method="post"
                        onsubmit="return confirm('Delete this user? This cannot be undone.')">
                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                      <i class="bi bi-trash"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${users.empty}">
              <td colspan="6" class="text-center text-muted py-4">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('userSearch').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#usersTable tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
</script>
</body>
</html>
