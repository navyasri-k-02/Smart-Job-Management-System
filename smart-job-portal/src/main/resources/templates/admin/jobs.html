<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Jobs – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <h2 class="fw-bold mb-1">Manage Jobs</h2>
      <p class="text-muted mb-0" th:text="${jobs.size()} + ' total jobs on platform'"></p>
    </div>
  </div>

  <div class="container py-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-3 mb-4">
      <div class="card-body p-3">
        <input type="text" class="form-control" id="jobSearch" placeholder="🔍 Search jobs by title, company, or location...">
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="jobsTable">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Job Title</th>
              <th>Company</th>
              <th>Type</th>
              <th>Status</th>
              <th>Posted</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="job, iter : ${jobs}">
              <td class="text-muted small" th:text="${iter.count}"></td>
              <td>
                <div class="fw-semibold" th:text="${job.title}"></div>
                <div class="text-muted small" th:text="${job.location ?: 'Remote'}"></div>
              </td>
              <td th:text="${job.companyName}"></td>
              <td><span class="badge bg-light text-dark" th:text="${job.jobType ?: 'N/A'}"></span></td>
              <td>
                <span th:class="'badge ' + (${job.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary')"
                      th:text="${job.status.name()}"></span>
              </td>
              <td class="text-muted small" th:text="${#temporals.format(job.createdAt, 'MMM dd, yyyy')}"></td>
              <td>
                <form th:action="'/admin/jobs/' + ${job.id} + '/delete'" method="post"
                      onsubmit="return confirm('Delete this job posting?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash me-1"></i>Delete
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('jobSearch').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#jobsTable tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });
</script>
</body>
</html>
