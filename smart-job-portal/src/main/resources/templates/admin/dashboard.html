<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – Smart Job Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-wrapper">
  <div class="page-header">
    <div class="container">
      <h2 class="fw-bold mb-1">⚙️ Admin Dashboard</h2>
      <p class="text-muted mb-0">Overview of the entire platform</p>
    </div>
  </div>

  <div class="container py-4">
    <!-- Stats Grid -->
    <div class="row g-4 mb-5">
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-blue">
          <div class="stat-card-icon"><i class="bi bi-mortarboard-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalStudents}">0</div>
            <div class="stat-card-label">Total Students</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-green">
          <div class="stat-card-icon"><i class="bi bi-building-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalEmployers}">0</div>
            <div class="stat-card-label">Total Employers</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-purple">
          <div class="stat-card-icon"><i class="bi bi-briefcase-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalJobs}">0</div>
            <div class="stat-card-label">Total Jobs</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-yellow">
          <div class="stat-card-icon"><i class="bi bi-lightning-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${activeJobs}">0</div>
            <div class="stat-card-label">Active Jobs</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-blue">
          <div class="stat-card-icon"><i class="bi bi-send-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${totalApplications}">0</div>
            <div class="stat-card-label">Total Applications</div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-lg-4">
        <div class="stat-card stat-card-green">
          <div class="stat-card-icon"><i class="bi bi-clock-fill"></i></div>
          <div class="stat-card-body">
            <div class="stat-card-number" th:text="${pendingApplications}">0</div>
            <div class="stat-card-label">Pending Applications</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions + Recent Jobs -->
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-3 h-100">
          <div class="card-header bg-white border-0 py-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-grid me-2 text-primary"></i>Quick Actions</h5>
          </div>
          <div class="card-body">
            <a href="/admin/users" class="btn btn-outline-primary w-100 mb-2">
              <i class="bi bi-people me-2"></i>Manage Users
            </a>
            <a href="/admin/jobs" class="btn btn-outline-success w-100 mb-2">
              <i class="bi bi-briefcase me-2"></i>Manage Jobs
            </a>
            <a href="/jobs" class="btn btn-outline-secondary w-100">
              <i class="bi bi-eye me-2"></i>View Public Site
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-3">
          <div class="card-header bg-white border-0 py-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-lightning me-2 text-warning"></i>Recent Job Postings</h5>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Title</th>
                  <th>Company</th>
                  <th>Status</th>
                  <th>Posted</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="job : ${recentJobs}">
                  <td class="fw-semibold" th:text="${job.title}"></td>
                  <td th:text="${job.companyName}"></td>
                  <td>
                    <span th:class="'badge ' + (${job.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary')"
                          th:text="${job.status.name()}"></span>
                  </td>
                  <td class="text-muted small" th:text="${#temporals.format(job.createdAt, 'MMM dd')}"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
